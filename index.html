<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NovaNet | Internet rápido</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header>
  <div class="logo-container">
    <img src="logo.png" alt="NovaNet">
    <span>NovaNet</span>
  </div>

  <nav>
    <button onclick="go()">Planes</button>
    <button onclick="go()">Contratar</button>
    <button onclick="go()">Promoción</button>
  </nav>
</header>

<section class="hero">
  <h1>Internet sin límites</h1>
  <p>Velocidad real para streaming, gaming y trabajo</p>
  <button class="cta" onclick="go()">Ver cobertura</button>
</section>

<section class="plans">

  <div class="card">
    <h3>Básico</h3>
    <p>50 Mbps</p>
    <h2>$299</h2>
    <button onclick="go()">Elegir</button>
  </div>

  <div class="card">
    <h3>Intermedio</h3>
    <p>150 Mbps</p>
    <h2>$499</h2>
    <button onclick="go()">Elegir</button>
  </div>

  <div class="card">
    <h3>Pro</h3>
    <p>300 Mbps</p>
    <h2>$699</h2>
    <button onclick="go()">Elegir</button>
  </div>

</section>

<footer>
  © 2026 NovaNet
</footer>

<script>
function go() {
  window.location.href = "ejemplo.mp4";
}
</script>

</body>
</html>
